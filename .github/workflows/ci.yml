name: GCON Continuous Integration

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:
  test:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"

    - name: Display Python version
      run: python --version

    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip

    - name: Install project dependencies
      run: |
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi
        pip install -e .

    - name: Verify Python syntax
      run: |
        python -m compileall .

    - name: Run unit tests
      run: |
        pytest tests/

    - name: Run Stage Integration Tests
      run: |
        for f in tests/stages/*_test.py; do
          echo "Running $f"
          python "$f"
        done

    - name: Success
      run: echo "All GCON validation tests passed."