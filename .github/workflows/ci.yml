name: GCON Continuous Integration

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:
  test:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"

    - name: Display Python version
      run: python --version

    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip

    - name: Install project dependencies
      run: |
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

    - name: Verify Python syntax
      run: |
        python -m compileall .

    - name: Run unit tests
      run: |
        if [ -d tests ]; then
          python -m unittest discover tests
        else
          echo "No unit tests found."
        fi

    - name: Run Stage Integration Tests
      run: |

        if [ -f stage14_test.py ]; then
          python stage14_test.py
        fi

        if [ -f stage15_test.py ]; then
          python stage15_test.py
        fi

        if [ -f stage16_test.py ]; then
          python stage16_test.py
        fi

        if [ -f stage17_test.py ]; then
          python stage17_test.py
        fi

    - name: Success
      run: echo "All GCON validation tests passed."