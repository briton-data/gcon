<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — GCON</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>

<body class="gcon-login-body">

    <div class="gcon-login-card">

        <div class="text-center mb-4">
            <i class="bi bi-diagram-3-fill" style="font-size: 2rem; color: var(--primary);"></i>
            <h4 class="mt-2 mb-0 text-white">GCON</h4>
            <div class="text-secondary small">Sign in to the cluster dashboard</div>
        </div>

        <div id="login-error" class="alert alert-danger d-none"></div>

        <div class="mb-3">
            <label class="form-label text-secondary">Email</label>
            <input type="email" class="form-control" id="login-email" autocomplete="username">
        </div>

        <div class="mb-3">
            <label class="form-label text-secondary">Password</label>
            <input type="password" class="form-control" id="login-password" autocomplete="current-password">
        </div>

        <button class="btn btn-primary w-100" id="login-submit">
            Sign In
        </button>

        <div class="text-secondary small mt-4 text-center">
            Demo account: any seeded user's email · password <code>gcon-demo-2026</code>
        </div>

    </div>

    <script>
        const emailInput = document.getElementById("login-email");
        const passwordInput = document.getElementById("login-password");
        const errorBox = document.getElementById("login-error");
        const submitBtn = document.getElementById("login-submit");

        async function doLogin() {
            errorBox.classList.add("d-none");
            submitBtn.disabled = true;
            submitBtn.textContent = "Signing in...";

            try {
                const response = await fetch("/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: emailInput.value.trim(),
                        password: passwordInput.value,
                    }),
                });

                if (!response.ok) {
                    const data = await response.json().catch(() => ({}));
                    throw new Error(data.detail || "Login failed.");
                }

                window.location.href = "/";
            } catch (err) {
                errorBox.textContent = err.message;
                errorBox.classList.remove("d-none");
                submitBtn.disabled = false;
                submitBtn.textContent = "Sign In";
            }
        }

        submitBtn.addEventListener("click", doLogin);
        passwordInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") doLogin();
        });
    </script>

</body>

</html>
