<div class="gcon-metric-card">

    <div class="gcon-metric-top">

        <div class="gcon-metric-icon">
            <i class="bi {{ icon }}"></i>
        </div>

        <div class="gcon-metric-value" id="{{ elem_id }}">
            {{ value }}
        </div>

    </div>

    <div class="gcon-metric-title">
        {{ title }}
    </div>

</div>
