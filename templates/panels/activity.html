<div class="gcon-panel">

    <div class="gcon-panel-header d-flex justify-content-between align-items-center">

        <h5 class="mb-0">

            Cluster Activity

        </h5>

        <span class="badge bg-success">

            Live

        </span>

    </div>

    <div class="gcon-panel-body">

        <div class="gcon-activity-feed" id="activity-feed">

        {% if dashboard.events %}

            {% for event in dashboard.events %}

            <div class="gcon-activity-item">

                <div class="gcon-activity-time">

                    {{ event.timestamp }}

                </div>

                <div class="gcon-activity-message">

                    {{ event.message }}

                </div>

            </div>

            {% endfor %}

        {% else %}

            <div class="text-secondary">

                No recent activity.

            </div>

        {% endif %}

        </div>

    </div>

</div>
